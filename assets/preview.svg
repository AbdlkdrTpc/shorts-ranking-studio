<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1420" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EEE3"/>
      <stop offset="1" stop-color="#E6D3BF"/>
    </linearGradient>
    <linearGradient id="accent" x1="980" y1="130" x2="1260" y2="670" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7F1"/>
      <stop offset="1" stop-color="#ECD9C9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFDFC"/>
      <stop offset="1" stop-color="#F1E4D7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#51331C" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#4A2D17" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="40" fill="url(#bg)"/>
  <circle cx="1350" cy="140" r="130" fill="#F2C7AA" fill-opacity="0.42"/>
  <circle cx="160" cy="790" r="180" fill="#FFFFFF" fill-opacity="0.4"/>

  <g transform="translate(110 120)">
